columns:
  id: NUMBER(38,0)
  source_pipeline: VARCHAR(255)
  body_content_type: VARCHAR(255)
  score: NUMBER(38,0)

# CC001_SOURCE_CHK is unchanged (NOCHANGE), CC001_SCORE_RANGE_CHK expression is changed (ALTER),
# CC001_BODY_CT_CHK is removed (DROP)
check:
  CC001_SOURCE_CHK: "SOURCE_PIPELINE = 'outlook'"
  CC001_SCORE_RANGE_CHK: "SCORE >= 0 AND SCORE <= 1000"
